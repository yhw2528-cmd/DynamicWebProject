<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>객체 생성 및 활용</title></head>
<body>
<h3>객체 생성 및 활용</h3>
<hr>
<script>
   // Date 객체 생성
   var today = new Date(); 

   // Date 객체의 toGMTString() 메소드 호출
   document.write("현재 시간 : " + today.toGMTString() 
                  + "<br>");

   // String 객체 생성
   var mystr= new String("자바스크립트 공부하기");
   var address=new String("인천광역시 부평구 십정동");
   document.write("mystr의 내용 : " + mystr + "<br>");
   document.write("mystr의 길이 : " + mystr.length + "<br>");
   document.write("집 주소 : " + address + "<br>");
   document.write("집 주소의 길이 : " + address.length + "<br>");
   // mystr.length=10; // 이 문장은 오류이다.
</script>
</body>
</html>
