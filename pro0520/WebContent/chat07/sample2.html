<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<script type="text/javascript">
	var alpha = ["a", "b", "c", "d", "e"];
	for (i = 0; i < alpha.length; i++) {
		var j=i+1;
		while(j>0){
			document.write(alpha[i]);
			j--;
		}
	    document.write("<br>");
}
</script>

</body>
</html>
