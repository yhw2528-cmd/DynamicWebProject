<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<head>
<title>this 활용</title>
<script>
function change(obj, size, color,bcolor) {
	obj.style.color = color;
	obj.style.fontSize = size;
	obj.style.backgroundColor=bcolor;
}
</script>
</head>
<body>
<h3>this 활용</h3>
<hr>
<button onclick="change(this, '30px', 'red','yellow')">버튼</button>
<button onclick="change(this, '30px', 'blue','green')">버튼</button>
<div onclick="change(this, '25px', 'orange','skyblue')">
	여기 클릭하면 크기와 색 변경
</div>
</body>
</html>
