<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<head><title>문서의 동적 구성</title>
<script>
function createDIV() {
	var obj = document.getElementById("result");
	var text=document.getElementById("text").value;
	var divClass = document.getElementById("divClass").value;
	var newDIV = document.createElement("div");
	newDIV.innerHTML = text;
	newDIV.setAttribute("class", divClass);
	newDIV.style.backgroundColor = "yellow";
	newDIV.onclick = function() {
		var p = this.parentElement; // 부모 HTML 태그 요소
		p.removeChild(this); // 자신을 부모로부터 제거
	};	
	obj.appendChild(newDIV);
}

function removeClass() {
    var removeClassName = document.getElementById("removeId").value;
    var classArray = Array.from(document.getElementsByClassName(removeClassName)); // ✅ 일반 배열로 변환
    for (var i = 0; i < classArray.length; i++) {
        classArray[i].remove();
    }
}
</script>
</head>
<body id="parent">
<h3>DIV 객체를 동적으로 생성, 삽입, 삭제하는 예제</h3>
<hr>
<p>DOM 트리에 동적으로 객체를 삽입할 수 있습니다.
createElement(), appendChild(), 
removeChild() 메소드를 이용하여 새로운 객체를 생성,
삽입, 삭제하는 예제입니다.</p>
DIV 내용:<input type="text" id="text"><br>
DIV 클래스명:<input type="text" id="divClass"><br>

<a href="javascript:createDIV()">DIV 생성</a><p>
<p id="result">여기 생성</p>
삭제하고자하는 div 클래스명 입력:<input type="text" id="removeId">
<button onclick="removeClass()">Div 클래스 삭제</button>
</body>
</html>
