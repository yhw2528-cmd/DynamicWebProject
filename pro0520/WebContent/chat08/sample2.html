<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<head><title>CSS 스타일 동적 변경</title>
<script>
function change() {
	var span = document.getElementById("mySpan"); 
	span.style.color = "green"; // 글자 색 green
	span.style.fontSize = "30px"; // 글자 크기는 30픽셀
	span.style.display = "block"; // 블록 박스로 변경
	span.style.width = "6em"; // 박스의 폭. 6 글자 크기
	span.style.border = "3px dotted magenta"; // 3픽셀 점선 magenta 테두리
	span.style.margin = "20px"; // 상하좌우 여백 20px
}

function change1(){
	var para=document.getElementById("myPara");
	para.style.color="blue";
	para.style.fontSize = "30px"; // 글자 크기는 30픽셀
	para.style.display = "green"; // 블록 박스로 변경
	para.style.width = "6em"; // 박스의 폭. 6 글자 크기
	para.style.border = "3px dotted magenta"; // 3픽셀 점선 magenta 테두리
	para.style.margin = "20px"; // 상하좌우 여백 20px
	
}
</script>
</head>
<body>
<h3>CSS 스타일 동적 변경</h3>
<hr>
<p style="color:blue" >이것은 
    <span id="mySpan" style="color:red">문장입니다.</span>
</p>
<p id="myPara">테스트를 위한 패러그래프</p>
<input type="button" value="스타일변경" onclick="change()">
<input type="button" value="패러그래프변경" onclick="change1()">
</body>
</html>
